name: Build Windows EXE

on:
  workflow_dispatch:  # 允许在GitHub网页上手动触发
    inputs:
      version:
        description: '版本号 (例如: 4.2.0)'
        required: true
        default: '4.2.0'

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true  # 临时允许Node.js 20

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30  # 设置超时时间
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      timeout-minutes: 5
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
      timeout-minutes: 5
    
    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip --no-cache-dir
      timeout-minutes: 5
    
    - name: Install core dependencies (retry on failure)
      run: |
        for i in {1..3}; do
          pip install PyQt6 PyQt6-WebEngine --no-cache-dir && break || sleep 10
        done
      timeout-minutes: 15
    
    - name: Install data processing dependencies (retry on failure)
      run: |
        for i in {1..3}; do
          pip install pandas openpyxl --no-cache-dir && break || sleep 10
        done
      timeout-minutes: 10
    
    - name: Install PDF parsing dependencies (retry on failure)
      run: |
        for i in {1..3}; do
          pip install PyMuPDF --no-cache-dir && break || sleep 10
        done
      timeout-minutes: 10
    
    - name: Install PyInstaller
      run: |
        pip install pyinstaller --no-cache-dir
      timeout-minutes: 5
    
    - name: Verify installations
      run: |
        python -c "import PyQt6; print('PyQt6 installed successfully')"
        python -c "import pandas; print('pandas installed successfully')"
        python -c "import fitz; print('PyMuPDF installed successfully')"
        python -c "import PyInstaller; print('PyInstaller installed successfully')"
      timeout-minutes: 3
    
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name="发票归集软件-v${{ github.event.inputs.version }}" --clean app.py
      timeout-minutes: 20
    
    - name: Verify EXE exists
      run: |
        if (Test-Path "dist\发票归集软件-v${{ github.event.inputs.version }}.exe") {
          Write-Host "EXE build successful"
          Get-Item "dist\发票归集软件-v${{ github.event.inputs.version }}.exe" | Select-Object Name, Length
        } else {
          Write-Error "EXE build failed - file not found"
          exit 1
        }
      timeout-minutes: 3
    
    - name: Create release package
      run: |
        if (-not (Test-Path "release")) { mkdir release }
        Copy-Item "dist\发票归集软件-v${{ github.event.inputs.version }}.exe" -Destination "release\"
        Copy-Item "README.md" -Destination "release\" -ErrorAction SilentlyContinue
        Copy-Item "CHANGELOG.md" -Destination "release\" -ErrorAction SilentlyContinue
        Copy-Item "BUILD_EXE_GUIDE.md" -Destination "release\" -ErrorAction SilentlyContinue
      timeout-minutes: 2
    
    - name: List release contents
      run: |
        Get-ChildItem -Path release -Recurse | Select-Object Name, Length
      timeout-minutes: 2
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: 发票归集软件-v${{ github.event.inputs.version }}-windows
        path: release/
        retention-days: 30
      timeout-minutes: 10
    
    - name: Create Draft Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: 发票归集软件 v${{ github.event.inputs.version }}
        draft: true  # 创建草稿，等待手动发布
        prerelease: false
        files: |
          release/发票归集软件-v${{ github.event.inputs.version }}.exe
          release/README.md
          release/CHANGELOG.md
          release/BUILD_EXE_GUIDE.md
        body: |
          ## 发票归集软件 v${{ github.event.inputs.version }}
          
          ### 下载说明
          - 下载 `发票归集软件-v${{ github.event.inputs.version }}.exe` 即可使用
          - 无需安装Python环境，直接运行即可
          
          ### 主要更新
          - 详见 CHANGELOG.md
          
          ### 系统要求
          - Windows 10 或更高版本
          
          ### 使用说明
          - 详见 README.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      timeout-minutes: 10