name: Build Windows EXE

on:
  workflow_dispatch:  # 允许在GitHub网页上手动触发
    inputs:
      version:
        description: '版本号 (例如: 4.2.0)'
        required: true
        default: '4.2.0'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 PyQt6-WebEngine pandas openpyxl PyMuPDF pyinstaller
    
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name="发票归集软件-v${{ github.event.inputs.version }}" app.py
    
    - name: Create release package
      run: |
        mkdir release
        copy dist\发票归集软件-v${{ github.event.inputs.version }}.exe release\
        copy README.md release\
        copy CHANGELOG.md release\
        copy BUILD_EXE_GUIDE.md release\
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: 发票归集软件-v${{ github.event.inputs.version }}-windows
        path: release/
        retention-days: 30
    
    - name: Create Draft Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: 发票归集软件 v${{ github.event.inputs.version }}
        draft: true  # 创建草稿，等待手动发布
        prerelease: false
        files: |
          release/发票归集软件-v${{ github.event.inputs.version }}.exe
          release/README.md
          release/CHANGELOG.md
          release/BUILD_EXE_GUIDE.md
        body: |
          ## 发票归集软件 v${{ github.event.inputs.version }}
          
          ### 下载说明
          - 下载 `发票归集软件-v${{ github.event.inputs.version }}.exe` 即可使用
          - 无需安装Python环境，直接运行即可
          
          ### 主要更新
          - 详见 CHANGELOG.md
          
          ### 系统要求
          - Windows 10 或更高版本
          
          ### 使用说明
          - 详见 README.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}