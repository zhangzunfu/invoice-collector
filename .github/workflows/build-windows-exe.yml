name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 4.2.0)'
        required: true
        default: '4.2.0'

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
      continue-on-error: false
    
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name="发票归集软件-v${{ github.event.inputs.version }}" app.py
    
    - name: Create release package
      run: |
        if (-not (Test-Path "release")) { mkdir release }
        Copy-Item "dist\发票归集软件-v${{ github.event.inputs.version }}.exe" -Destination "release\" -Force
        if (Test-Path "README.md") { Copy-Item "README.md" -Destination "release\" -Force }
        if (Test-Path "CHANGELOG.md") { Copy-Item "CHANGELOG.md" -Destination "release\" -Force }
        if (Test-Path "BUILD_EXE_GUIDE.md") { Copy-Item "BUILD_EXE_GUIDE.md" -Destination "release\" -Force }
    
    - name: List release contents
      run: |
        Get-ChildItem -Path release -Recurse | Format-Table Name, Length, LastWriteTime
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: 发票归集软件-v${{ github.event.inputs.version }}-windows
        path: release/
        retention-days: 30
      if: success()
    
    - name: Create Draft Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: 发票归集软件 v${{ github.event.inputs.version }}
        draft: true
        prerelease: false
        files: |
          release/发票归集软件-v${{ github.event.inputs.version }}.exe
        body: |
          ## 发票归集软件 v${{ github.event.inputs.version }}
          
          ### 下载说明
          - 下载 `发票归集软件-v${{ github.event.inputs.version }}.exe` 即可使用
          - 无需安装Python环境，直接运行即可
          
          ### 主要更新
          - 详见 CHANGELOG.md
          
          ### 系统要求
          - Windows 10 或更高版本
          
          ### 使用说明
          - 详见 README.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      if: success()